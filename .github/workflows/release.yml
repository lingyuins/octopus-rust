# Release workflow: build & publish on tag push (`v*`).
#
# Triggers:
#   - Push of a version tag matching `v*` (e.g. `v2.0.0`).
#   - Manual `workflow_dispatch` (for debugging; produces no Release/tag).
#
# Produces:
#   1. Multi-arch (amd64 + arm64) Docker image pushed to GHCR.
#   2. Per-platform binary bundles attached to the GitHub Release:
#      static-musl tarballs for Linux (amd64/arm64) and a zip for Windows (amd64).
#
# GHCR auth uses the built-in `GITHUB_TOKEN` — no extra secrets required.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # to create the GitHub Release & upload assets
  packages: write   # to push the image to GHCR

env:
  # Lowercased owner/repo → GHCR image path, e.g. ghcr.io/lingyuins/octopus-rust
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Job A: multi-arch Docker image → GHCR
  # ---------------------------------------------------------------------------
  docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # `v2.0.0` → tags `2.0.0` and `latest`; on non-tag runs use `sha-<short>`.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,format=short,enable=${{ !startsWith(github.ref, 'refs/tags/v') }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.meta.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ---------------------------------------------------------------------------
  # Job B: per-arch static binary tarballs (artifact only)
  # ---------------------------------------------------------------------------
  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            rust_target: x86_64-unknown-linux-musl
            use_cross: false
          - os: ubuntu-latest
            arch: arm64
            rust_target: aarch64-unknown-linux-musl
            use_cross: true
          - os: windows-latest
            arch: amd64
            rust_target: x86_64-pc-windows-msvc
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20 & pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: corepack prepare pnpm@10.22.0 --activate

      - name: Install frontend deps & build
        working-directory: web
        shell: bash
        env:
          NEXT_PUBLIC_APP_VERSION: ${{ github.ref_name }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build
          # Copy the static export where the server expects it at runtime.
          # `static/out` is gitignored, so the dir may not exist in a fresh checkout.
          rm -rf ../static/out
          mkdir -p ../static
          cp -r out ../static/out

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      # Linux/amd64: native musl via apt. Linux/arm64: `cross` (Docker-based).
      # Windows/amd64: MSVC toolchain is preinstalled on windows-latest — nothing to add.
      - name: Install musl tools (linux/amd64 only)
        if: ${{ matrix.os == 'ubuntu-latest' && !matrix.use_cross }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (linux/arm64 only)
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.use_cross }}
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.rust_target }}
          else
            cargo build --release --target ${{ matrix.rust_target }}
          fi

      - name: Stage release bundle
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            OS_NAME="windows"
            BIN="octopus.exe"
            STAGE="octopus-${VERSION}-windows-${{ matrix.arch }}"
          else
            OS_NAME="linux"
            BIN="octopus"
            STAGE="octopus-${VERSION}-linux-${{ matrix.arch }}"
          fi
          mkdir -p "$STAGE"
          cp "target/${{ matrix.rust_target }}/release/$BIN" "$STAGE/$BIN"
          mkdir -p "$STAGE/static"
          cp -r static/out "$STAGE/static/out"
          cp README.md "$STAGE/" 2>/dev/null || true
          cat > "$STAGE/README.txt" <<EOF
          Octopus ${VERSION} (${OS_NAME}-${{ matrix.arch }})
          ============================================
          This bundle contains:
            - ${BIN}        : release binary
            - static/out/   : built frontend (served by the binary)

          Run:
            ./${BIN} start
          Then open http://localhost:8080

          Note: first run needs a security config. Create data/config.json with
          "security.encryption_key" or "auth.jwt_secret" set to a random long
          string, or set the corresponding OCTOPUS_* env vars.
          EOF
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "$STAGE.zip" "$STAGE"
            echo "ASSET=$STAGE.zip" >> "$GITHUB_ENV"
          else
            tar -czf "$STAGE.tar.gz" "$STAGE"
            echo "ASSET=$STAGE.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job C: attach binary tarballs to the GitHub Release for the tag
  # ---------------------------------------------------------------------------
  release:
    needs: [binaries]
    runs-on: ubuntu-latest
    # Only publish a Release on an actual tag run (skip for workflow_dispatch).
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for commit-range log

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          # Only fetch our release bundles — skip unrelated artifacts (e.g. the
          # `.dockerbuild` build log produced by buildx) that download-artifact
          # would otherwise try to pull in with `merge-multiple` + no pattern.
          pattern: octopus-*
          path: assets
          merge-multiple: true

      # Build a concise, commit-driven changelog from the commits between the
      # previous tag and this one. `generate_release_notes` (below) already
      # produces GitHub's auto-notes; this `body` is prepended to give a
      # curated summary that groups fixes/features by conventional-commit type.
      - name: Generate commit-based release notes
        id: notes
        shell: bash
        run: |
          # Find the previous tag (the one immediately before the current ref).
          PREV_TAG=$(git describe --tags --abbrev=0 "${{ github.ref }}^" 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${{ github.ref_name }}"
          else
            RANGE="${{ github.ref_name }}"
          fi

          {
            echo "## 更新内容"
            echo ""
            # Group by conventional-commit type, preserving original messages.
            git log "$RANGE" --pretty=format:"%s" --no-merges | \
            awk '
              /^fix:/    { sub(/^fix:[[:space:]]*/, "");   print "- 🐛 " $0; next }
              /^feat:/   { sub(/^feat:[[:space:]]*/, "");  print "- ✨ " $0; next }
              /^perf:/   { sub(/^perf:[[:space:]]*/, "");  print "- ⚡ " $0; next }
              /^refactor:/{ sub(/^refactor:[[:space:]]*/, ""); print "- ♻️ " $0; next }
              /^docs:/   { sub(/^docs:[[:space:]]*/, "");  print "- 📝 " $0; next }
              /^chore:/  { sub(/^chore:[[:space:]]*/, ""); print "- 🔧 " $0; next }
              /^build:/  { sub(/^build:[[:space:]]*/, ""); print "- 📦 " $0; next }
              /^ci:/     { sub(/^ci:[[:space:]]*/, "");    print "- 👷 " $0; next }
              { print "- " $0 }
            '
            echo ""
            echo "---"
            echo "完整提交历史: [\`${RANGE}\`](${{ github.server_url }}/${{ github.repository }}/compare/${RANGE})"
          } > release_notes.md

          # Preserve newlines in the multi-line output.
          {
            echo "body<<EOF"
            cat release_notes.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            assets/*.tar.gz
            assets/*.zip
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: true
          draft: false
          # Only treat genuine pre-release suffixes as prerelease.
          # `-fix`, `-fix2`, … are stable patch tags, NOT pre-releases.
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-pre') }}
