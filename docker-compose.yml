services:
  octopus:
    image: lingyuins/octopus:v2.0.0-rust
    container_name: octopus
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      TZ: "Asia/Shanghai"
      # OCTOPUS_AUTH_JWT_SECRET: ""  # Set a random long string for persistent JWT tokens
      # OCTOPUS_SERVER_TRUSTED_PROXIES: "172.17.0.0/16"  # For Docker bridge networks
      # OCTOPUS_SECURITY_ENCRYPTION_KEY: ""  # AES encryption key for sensitive data