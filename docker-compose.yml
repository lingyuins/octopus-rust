services:
  octopus:
    image: ghcr.io/lingyuins/octopus-rust:0.0.1
    container_name: octopus
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      TZ: "Asia/Shanghai"
      # Secrets are auto-generated on first start (written to data/config.json).
      # Override here only if you want to pin your own values:
      # OCTOPUS_AUTH_JWT_SECRET: ""  # persistent JWT signing secret
      # OCTOPUS_SECURITY_ENCRYPTION_KEY: ""  # AES key for sensitive data at rest
      # OCTOPUS_SERVER_TRUSTED_PROXIES: "172.17.0.0/16"  # For Docker bridge networks